name: insighted
description: "insightED - An accessible learning app for visually impaired users."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  firebase_core: ^3.12.0
  firebase_auth: ^5.4.2
  cloud_firestore: ^5.6.4
  flutter_tts: ^4.2.2
  flutter_sound_record: ^3.3.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  validators: ^3.0.0
  speech_to_text: ^7.3.0
  http: ^1.2.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpg"
  adaptive_icon_background: "#4A6CF7"
  adaptive_icon_foreground: "assets/logo.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/
